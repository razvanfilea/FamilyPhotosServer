{% for group in groups %}
{% if group.show_header %}
{% include "components/month_header.html" %}
{% endif %}
{% for photo in group.photos %}
{% include "components/photo_card.html" %}
{% endfor %}
{% endfor %}
{% if has_more %}
{% if let Some(cursor) = next_cursor %}
<div id="load-more-sentinel"
     class="col-span-full py-8 flex justify-center"
     hx-get="{{ load_more_url }}?cursor={{ cursor }}{% if let Some(month) = last_month %}&last_month={{ month }}{% endif %}{% if let Some(cat) = category %}&category={{ cat }}{% endif %}"
     hx-trigger="revealed"
     hx-swap="outerHTML">
    <span class="loading loading-spinner loading-lg text-primary"></span>
</div>
{% endif %}
{% endif %}
