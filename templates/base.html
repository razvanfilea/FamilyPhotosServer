<!DOCTYPE html>
<html lang="en" data-theme="dim">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="description" content="Family Photos">

    <script src="https://unpkg.com/htmx.org@2.0.7/dist/htmx.min.js"></script>
    <script src="/assets/js/thumbhash.js"></script>
    <script src="/assets/js/lazy-load.js"></script>

    <link rel="apple-touch-icon" sizes="180x180" href="/assets/fav/apple-touch-icon.png"/>
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/fav/favicon-32x32.png"/>
    <link rel="icon" type="image/ico" sizes="16x16" href="/assets/fav/favicon.ico"/>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/assets/css/main.css?v={{ crate::http::AppState::CSS_VERSION }}">
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"/>

    <title>{% block title %}Family Photos{% endblock %}</title>
</head>
<body>
<div class="drawer lg:drawer-open">
    <input id="drawer-sidebar" type="checkbox" class="drawer-toggle"/>
    <div class="drawer-content flex flex-col min-h-screen">
        <header class="w-full navbar bg-base-300">
            <div class="flex-none">
                <label for="drawer-sidebar" aria-label="open sidebar" class="btn btn-square btn-ghost lg:hidden">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                         class="inline-block size-6 stroke-current">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </label>
            </div>
            <div class="flex-1 px-2 mx-2 text-xl font-semibold">{% block page_title %}Family Photos{% endblock %}</div>
            <div class="flex-none">
                {% block nav_menu %}{% endblock %}
            </div>
        </header>

        <main id="content" class="flex-1 p-4">
            {% block content %}<p>Placeholder content</p>{% endblock %}
        </main>
    </div>

    <nav class="drawer-side lg:transition-none z-50">
        <label for="drawer-sidebar" aria-label="close sidebar" class="drawer-overlay"></label>
        <ul class="menu menu-lg py-4 w-72 min-h-full bg-base-200 text-base-content gap-1">
            <li class="menu-title flex flex-row items-center gap-2 mb-4">
                <span class="material-symbols-outlined text-primary">photo_library</span>
                <span class="text-xl font-bold">Family Photos</span>
            </li>

            {% block sidebar_content %}
            {% include "components/sidebar.html" %}
            {% endblock %}
        </ul>
    </nav>

    <div class="toast toast-bottom toast-end z-[9999]">
        <div id="errors-list" class="flex flex-col gap-4">
        </div>
    </div>
</div>


<script>
    document.addEventListener("htmx:confirm", function (e) {
        if (!e.detail.target.hasAttribute('hx-confirm') && !e.detail.elt.hasAttribute('hx-confirm')) return;
        e.preventDefault();

        const dialog = document.getElementById('confirm_dialog');
        document.getElementById('confirm_dialog_prompt').textContent = e.detail.question;
        document.getElementById('confirm_dialog_accept').onclick = () => {
            e.detail.issueRequest(true);
            dialog.close();
        };
        dialog.showModal();
    });
</script>

<dialog id="confirm_dialog" class="modal">
    <div class="modal-box">
        <h3 class="text-lg font-bold mb-4">Confirm Action</h3>

        <p id="confirm_dialog_prompt"></p>

        <div class="modal-action grid grid-cols-2">
            <button class="btn" onclick="confirm_dialog.close()">
                Cancel
            </button>

            <button id="confirm_dialog_accept" class="btn btn-primary">
                OK
            </button>
        </div>
    </div>
    <form method="dialog" class="modal-backdrop">
        <button>close</button>
    </form>
</dialog>

<template id="photo-viewer-template">
    <div id="photo-viewer" class="photo-viewer-container hidden">
        <div id="photo-viewer-backdrop" class="photo-viewer-backdrop"></div>
        <div class="photo-viewer-content">
            <div class="photo-viewer-toolbar">
                <button id="photo-viewer-close" class="photo-viewer-close btn btn-ghost btn-circle" title="Close">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <div class="photo-viewer-media-container">
                <div class="photo-viewer-media"></div>
            </div>
            <button id="photo-viewer-prev" class="photo-viewer-nav photo-viewer-nav-prev btn btn-circle btn-ghost" title="Previous">
                <span class="material-symbols-outlined">chevron_left</span>
            </button>
            <button id="photo-viewer-next" class="photo-viewer-nav photo-viewer-nav-next btn btn-circle btn-ghost" title="Next">
                <span class="material-symbols-outlined">chevron_right</span>
            </button>
            <div class="photo-viewer-actions">
                <div id="viewer-actions-container" class="photo-viewer-actions-inner">
                    <!-- Server-rendered actions swapped here by JS -->
                </div>
            </div>
            <div id="photo-info-panel" class="photo-viewer-info-panel">
                <div class="photo-viewer-info-header">
                    <h3>Details</h3>
                    <button id="photo-info-close" class="btn btn-ghost btn-circle btn-sm">
                        <span class="material-symbols-outlined">close</span>
                    </button>
                </div>
                <div id="photo-info-content" class="photo-viewer-info-content">
                    <span class="loading loading-spinner loading-sm htmx-indicator"></span>
                </div>
            </div>
        </div>
    </div>
</template>

<script src="/assets/js/timeline-scrollbar.js"></script>
<script src="/assets/js/photo-viewer-touch.js"></script>
<script src="/assets/js/photo-viewer-animation.js"></script>
<script src="/assets/js/photo-viewer.js"></script>
</body>
</html>
